<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>야곱의 씨름 — 창세기 32-33장</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+KR:wght@300;400;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--gold:#F5C842;--gold-dark:#c89010;}
html{height:100%;background:#111;display:flex;align-items:center;justify-content:center;}body{height:100%;background:#111;font-family:'Noto Serif KR',serif;overflow:hidden;display:flex;align-items:center;justify-content:center;width:100%;}
#game{width:min(100vw,600px);height:100vh;max-height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,0.8);}
#scene{flex:1;position:relative;overflow:hidden;min-height:0;min-height:clamp(180px,45vh,400px);background:#000;}

.illus{
  position:absolute;inset:0;background-size:cover;background-position:center top;
  transition:opacity 1.8s ease;will-change:transform,opacity;
}
#illus1{background-image:url('../images/ep03_img1.jpg');opacity:1;animation:kb1 16s ease-in-out infinite alternate;}
#illus2{background-image:url('../images/ep03_img2.jpg');opacity:0;animation:kb2 16s ease-in-out infinite alternate;}
@keyframes kb1{from{transform:scale(1.04) translate(0,0);}to{transform:scale(1.10) translate(-7px,-5px);}}
@keyframes kb2{from{transform:scale(1.07) translate(3px,0);}to{transform:scale(1.04) translate(-5px,-7px);}}

.vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center 40%,transparent 32%,rgba(0,0,0,0.62) 100%);z-index:5;pointer-events:none;}
.ov{position:absolute;inset:0;z-index:6;pointer-events:none;transition:opacity 1.5s;}
#ov-night{background:rgba(5,8,30,0.45);opacity:0;}
#ov-divine{background:radial-gradient(ellipse at 50% 8%,rgba(255,240,100,0.48) 0%,transparent 65%);opacity:0;}
#ov-doubt{background:rgba(15,8,35,0.55);opacity:0;transition:opacity 0.8s;}
#ov-warm{background:radial-gradient(ellipse at 50% 60%,rgba(255,160,50,0.30) 0%,transparent 70%);opacity:0;}
#ov-flash{background:rgba(200,230,255,0.70);opacity:0;}

#light-rays{
  position:absolute;top:-20%;left:50%;transform:translateX(-50%);
  width:500px;height:600px;opacity:0;z-index:7;pointer-events:none;transition:opacity 1.5s;
  background:conic-gradient(from -30deg at 50% 0%,transparent 0deg,rgba(255,255,200,0.18) 8deg,transparent 16deg,transparent 24deg,rgba(255,255,180,0.13) 32deg,transparent 40deg,transparent 48deg,rgba(255,255,200,0.20) 56deg,transparent 64deg);
  animation:rayRot 9s linear infinite;
}
@keyframes rayRot{from{transform:translateX(-50%) rotate(0deg);}to{transform:translateX(-50%) rotate(360deg);}}

/* 달빛 */
#moonlight{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:300px;height:300px;
  background:radial-gradient(circle at 50% 20%,rgba(180,200,255,0.25) 0%,transparent 65%);
  z-index:6;pointer-events:none;opacity:0;transition:opacity 1.5s;
}
#moonlight.show{opacity:1;}

#chapter-title{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  font-family:'Cinzel',serif;font-size:clamp(0.58rem,1.8vw,0.82rem);
  letter-spacing:0.22em;color:rgba(255,220,100,0.92);
  text-shadow:0 1px 6px rgba(0,0,0,0.9);z-index:20;opacity:0;
  transition:opacity 0.8s;white-space:nowrap;text-transform:uppercase;
}
#chapter-title.show{opacity:1;}
#verse-badge{
  position:absolute;top:40px;left:50%;transform:translateX(-50%);
  font-family:'Noto Serif KR',serif;font-size:0.68rem;
  color:rgba(255,240,180,0.75);text-shadow:0 1px 4px rgba(0,0,0,0.9);
  z-index:20;opacity:0;transition:opacity 1s;font-style:italic;white-space:nowrap;
}
#verse-badge.show{opacity:1;}

/* ── CHOICE ── */
#choice-overlay{
  position:absolute;inset:0;z-index:30;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.7s;
}
#choice-overlay.show{opacity:1;pointer-events:all;}
.choice-title{
  font-family:'Cinzel',serif;font-size:clamp(0.88rem,2.4vw,1.2rem);
  color:#fff;text-align:center;letter-spacing:0.08em;
  text-shadow:0 0 20px rgba(0,0,0,1),0 2px 8px rgba(0,0,0,1);
  margin-bottom:22px;padding:0 20px;line-height:1.65;
}
.choice-title em{color:var(--gold);font-style:normal;}
.choices{display:flex;flex-direction:column;gap:14px;width:min(490px,90vw);}
.choice-btn{
  position:relative;overflow:hidden;border:none;cursor:pointer;
  padding:0;border-radius:8px;transition:transform 0.15s,box-shadow 0.15s;text-align:left;
}
.choice-btn:hover{transform:translateY(-3px) scale(1.01);}
.choice-btn:active{transform:translateY(0) scale(0.99);}
.opt-b-fear{
  background:linear-gradient(135deg,#0d0818 0%,#060310 100%);
  box-shadow:0 4px 20px rgba(80,40,160,0.4);
  border:1px solid rgba(120,80,200,0.35);
}
.opt-b-fear:hover{box-shadow:0 6px 28px rgba(120,80,200,0.6);border-color:rgba(150,100,220,0.7);}
.opt-b-pray{
  background:linear-gradient(135deg,#1a1400 0%,#0a0c00 100%);
  box-shadow:0 4px 20px rgba(200,160,20,0.4);
  border:1px solid rgba(200,170,40,0.4);
}
.opt-b-pray:hover{box-shadow:0 6px 28px rgba(245,200,66,0.6);border-color:rgba(245,200,66,0.7);}
.choice-inner{display:flex;align-items:center;gap:14px;padding:16px 20px;}
.choice-label{flex-shrink:0;font-family:'Cinzel',serif;font-size:1.5rem;font-weight:900;width:36px;text-align:center;}
.opt-b-fear .choice-label{color:#b090ff;text-shadow:0 0 12px rgba(150,100,220,0.8);}
.opt-b-pray .choice-label{color:var(--gold);text-shadow:0 0 12px rgba(245,200,66,0.8);}
.choice-text-wrap{flex:1;}
.choice-main{font-family:'Noto Serif KR',serif;font-size:clamp(0.80rem,2.1vw,0.93rem);font-weight:700;line-height:1.5;display:block;margin-bottom:3px;}
.opt-b-fear .choice-main{color:#d8c8ff;}
.opt-b-pray .choice-main{color:#fff8d0;}
.choice-sub{font-size:0.67rem;font-family:'Noto Serif KR',serif;opacity:0.65;display:block;}
.opt-b-fear .choice-sub{color:#b090ff;}
.opt-b-pray .choice-sub{color:var(--gold);}
.choice-icon{font-size:1.8rem;flex-shrink:0;}
.choice-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.07) 50%,transparent 60%);
  transform:translateX(-100%);transition:transform 0.4s;
}
.choice-btn:hover::after{transform:translateX(100%);}

/* ── RESULT ── */
#choice-result{
  position:absolute;inset:0;z-index:35;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.4s;
  background:rgba(0,0,0,0.65);
}
#choice-result.show{opacity:1;pointer-events:all;}
.result-card{
  background:rgba(8,5,18,0.93);border-radius:12px;
  padding:28px 34px;max-width:min(430px,90vw);
  text-align:center;border:1px solid rgba(255,255,255,0.1);
}
.result-icon{font-size:3rem;margin-bottom:10px;display:block;}
.result-title{font-family:'Cinzel',serif;font-size:1.15rem;margin-bottom:10px;}
.result-text{font-family:'Noto Serif KR',serif;font-size:0.88rem;line-height:1.88;color:rgba(255,255,255,0.88);}
.res-fear .result-title{color:#b090ff;}
.res-pray .result-title{color:var(--gold);}
.result-continue{
  display:inline-block;margin-top:16px;
  font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:0.12em;
  color:#120a02;background:linear-gradient(135deg,var(--gold),var(--gold-dark));
  border:none;padding:8px 22px;border-radius:3px;cursor:pointer;
}

.spark{position:fixed;border-radius:50%;pointer-events:none;z-index:100;animation:sparkFly 1.4s ease-out forwards;}
@keyframes sparkFly{from{opacity:1;transform:translate(0,0) scale(1);}to{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0);}}

#progress-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,200,50,0.15);z-index:20;}
#progress-fill{height:100%;background:linear-gradient(90deg,#c89010,#F5C842,#ffe480);width:0%;transition:width 0.8s ease;}

#mute-btn{
  position:absolute;top:12px;right:14px;z-index:25;
  background:rgba(0,0,0,0.45);border:1px solid rgba(255,200,66,0.3);
  color:#fff;font-size:1.1rem;width:36px;height:36px;
  border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background 0.2s,transform 0.15s;backdrop-filter:blur(4px);
}
#mute-btn:hover{background:rgba(0,0,0,0.7);transform:scale(1.1);}

/* ── DIALOG ── */
#dialog{position:relative;z-index:50;background:linear-gradient(180deg,#0a0814 0%,#120e1e 100%);border-top:2px solid rgba(245,200,66,0.45);flex-shrink:0;}
#dialog-inner{display:flex;align-items:stretch;min-height:clamp(140px,30vw,190px);max-height:clamp(160px,35vw,210px);}
#portrait-wrap{
  width:100px;flex-shrink:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:10px 6px;
  border-right:1px solid rgba(245,200,66,0.2);gap:5px;position:relative;
}
.pglow{position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(255,200,60,0.08) 0%,transparent 70%);animation:pgAnim 3s ease-in-out infinite;}
@keyframes pgAnim{0%,100%{opacity:0.5;}50%{opacity:1;}}
#portrait-icon{font-size:2.8rem;filter:drop-shadow(0 0 8px rgba(255,200,80,0.6));animation:piFloat 3s ease-in-out infinite;}
@keyframes piFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
#portrait-name{font-family:'Cinzel',serif;font-size:0.58rem;color:var(--gold);letter-spacing:0.1em;text-align:center;}
#dialog-text-wrap{flex:1;padding:14px 18px;display:flex;flex-direction:column;justify-content:space-between;}
#dialog-text{font-family:'Noto Serif KR',serif;font-size:clamp(0.80rem,2.1vw,0.94rem);line-height:1.78;color:#ede0ff;flex:1;display:flex;align-items:center;}
#dialog-actions{display:flex;align-items:center;justify-content:space-between;margin-top:4px;flex-shrink:0;}
.dots{display:flex;gap:5px;}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(245,200,66,0.25);transition:background 0.3s;}
.dot.on{background:var(--gold);box-shadow:0 0 6px rgba(245,200,66,0.6);}
#next-btn{
  font-family:'Cinzel',serif;font-size:0.75rem;font-weight:700;
  letter-spacing:0.12em;color:#120a02;
  background:linear-gradient(135deg,var(--gold),var(--gold-dark));
  border:none;padding:7px 20px;border-radius:3px;cursor:pointer;
  transition:transform 0.12s,box-shadow 0.12s;box-shadow:0 2px 10px rgba(245,200,66,0.35);
}
#next-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(245,200,66,0.6);}
#next-btn:active{transform:translateY(0);}

/* ── TITLE ── */
#title-screen{
  position:absolute;inset:0;z-index:200;
  background:radial-gradient(ellipse at 50% 40%,#05081e 0%,#000 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;overflow:hidden;
}
.title-bg{
  position:absolute;inset:0;
  background-image:url('../images/ep03_img3.jpg');
  background-size:cover;background-position:center;
  opacity:0.22;filter:blur(2px);animation:kb1 15s ease-in-out infinite alternate;
}
.title-overlay{position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(5,8,30,0.72) 0%,rgba(0,0,0,0.93) 100%);}
#title-screen>*{position:relative;z-index:1;}
.title-emblem{font-size:3.5rem;animation:tFloat 3s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(150,180,255,0.9));}
@keyframes tFloat{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(-12px) rotate(4deg);}}
#title-screen h1{font-family:'Cinzel',serif;font-size:clamp(1.7rem,5vw,3.2rem);color:var(--gold);text-align:center;line-height:1.2;letter-spacing:0.06em;text-shadow:0 0 30px rgba(255,200,50,0.9),0 0 70px rgba(255,200,50,0.4);}
.title-ep{font-family:'Noto Serif KR',serif;color:rgba(180,160,255,0.6);font-size:0.72rem;letter-spacing:0.3em;}
.title-sub{font-family:'Noto Serif KR',serif;color:rgba(255,220,130,0.8);font-size:0.92rem;letter-spacing:0.18em;}
.title-verse{font-family:'Noto Serif KR',serif;color:rgba(220,210,255,0.62);font-size:0.77rem;font-style:italic;text-align:center;max-width:390px;line-height:1.88;}
#start-btn{font-family:'Cinzel',serif;font-size:1rem;font-weight:700;letter-spacing:0.18em;color:#120a02;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border:none;padding:13px 42px;border-radius:3px;cursor:pointer;margin-top:4px;box-shadow:0 0 30px rgba(245,200,66,0.6);animation:sPulse 2s ease-in-out infinite;}
@keyframes sPulse{0%,100%{box-shadow:0 0 20px rgba(245,200,66,0.5);}50%{box-shadow:0 0 45px rgba(245,200,66,1);}}

/* ── END ── */
#end-screen{
  position:absolute;inset:0;z-index:200;
  background:radial-gradient(ellipse at center,#100a00 0%,#000 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;opacity:0;pointer-events:none;transition:opacity 2s;overflow:hidden;
}
.end-bg{position:absolute;inset:0;background-image:url('../images/ep03_img4.jpg');background-size:cover;background-position:center;opacity:0.18;filter:blur(3px);}
.end-overlay{position:absolute;inset:0;background:rgba(5,3,0,0.84);}
#end-screen>*{position:relative;z-index:1;}
#end-screen.show{opacity:1;pointer-events:all;}
#end-screen h2{font-family:'Cinzel',serif;font-size:clamp(1.3rem,3.8vw,2.3rem);color:var(--gold);text-align:center;text-shadow:0 0 20px rgba(255,200,50,0.5);}
#end-screen p{font-family:'Noto Serif KR',serif;color:rgba(255,240,190,0.9);font-size:0.88rem;text-align:center;max-width:370px;line-height:2.0;}
.end-verse{font-family:'Cinzel',serif;color:rgba(245,200,66,0.65);font-size:0.72rem;letter-spacing:0.14em;}
#replay-btn{font-family:'Cinzel',serif;font-size:0.85rem;letter-spacing:0.1em;color:#fff;background:rgba(80,60,10,0.5);border:1px solid rgba(245,200,66,0.3);padding:9px 26px;border-radius:3px;cursor:pointer;margin-top:6px;transition:background 0.2s;}
#replay-btn:hover{background:rgba(120,90,15,0.6);}

/* ── iOS Safe Area ── */
#game{
  padding-bottom:env(safe-area-inset-bottom);
}
@supports(padding-bottom:env(safe-area-inset-bottom)){
  #dialog{
    padding-bottom:max(0px,env(safe-area-inset-bottom));
  }
}
</style>
</head>
<body>
<div id="game">

  <!-- TITLE -->
  <div id="title-screen">
    <div class="title-bg"></div>
    <div class="title-overlay"></div>
    <div class="title-emblem">🌙</div>
    <div class="title-ep">EPISODE 3</div>
    <h1>야곱의 씨름</h1>
    <div class="title-sub">창세기 32-33장</div>
    <div class="title-verse">"네가 하나님과 및 사람들과 겨루어 이겼음이니라"<br>— 창세기 32:28</div>
    <button id="start-btn" onclick="startGame()">▶ &nbsp;시작하기</button>
  </div>

  <!-- SCENE -->
  <div id="scene">
    <div class="illus" id="illus1"></div>
    <div class="illus" id="illus2"></div>
    <div class="vignette"></div>
    <div class="ov" id="ov-night"></div>
    <div class="ov" id="ov-divine"></div>
    <div class="ov" id="ov-doubt"></div>
    <div class="ov" id="ov-warm"></div>
    <div class="ov" id="ov-flash"></div>
    <div id="light-rays"></div>
    <div id="moonlight"></div>
    <div id="chapter-title"></div>
    <div id="verse-badge"></div>

    <!-- CHOICE -->
    <div id="choice-overlay">
      <div class="choice-title">
        <em>야곱의 내적 갈등</em><br>
        20년 만에 형 에서를 만나야 한다.<br>400명을 이끌고 오는 에서 앞에서 어떻게 할 것인가?
      </div>
      <div class="choices">
        <button class="choice-btn opt-b-fear" onclick="choose(false)">
          <div class="choice-inner">
            <span class="choice-label">A</span>
            <div class="choice-text-wrap">
              <span class="choice-main">"형을 어떻게 만나지? 너무 두려워서 잠을 잘 수 없어!"</span>
              <span class="choice-sub">두려움에 사로잡힌다 — 과거의 죄책감이 발목을 잡는다</span>
            </div>
            <span class="choice-icon">😨</span>
          </div>
        </button>
        <button class="choice-btn opt-b-pray" onclick="choose(true)">
          <div class="choice-inner">
            <span class="choice-label">B</span>
            <div class="choice-text-wrap">
              <span class="choice-main">"두렵지만 하나님께 기도하자!"</span>
              <span class="choice-sub">두려움을 기도로 바꾼다 — 하나님께 매달리는 믿음</span>
            </div>
            <span class="choice-icon">🙏</span>
          </div>
        </button>
      </div>
    </div>

    <!-- RESULT -->
    <div id="choice-result">
      <div class="result-card" id="result-card">
        <span class="result-icon" id="result-icon"></span>
        <div class="result-title" id="result-title"></div>
        <div class="result-text" id="result-text"></div>
        <button class="result-continue" id="result-continue-btn">계속 →</button>
      </div>
    </div>

    <div id="progress-bar"><div id="progress-fill"></div></div>
    <button id="mute-btn" onclick="toggleMute()">🔊</button>
  </div>

  <!-- DIALOG -->
  <div id="dialog">
    <div id="dialog-inner">
      <div id="portrait-wrap">
        <div class="pglow"></div>
        <div id="portrait-icon">🏃</div>
        <div id="portrait-name">JACOB</div>
      </div>
      <div id="dialog-text-wrap">
        <div id="dialog-text"><span id="dialog-content"></span></div>
        <div id="dialog-actions">
          <div class="dots" id="dots"></div>
          <button id="next-btn" onclick="nextScene()">계속 →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- END -->
  <div id="end-screen">
    <div class="end-bg"></div>
    <div class="end-overlay"></div>
    <div style="font-size:2.8rem;">🤝🌅✨</div>
    <h2>화해와 새 이름</h2>
    <p>두려움을 이긴 야곱은 이스라엘이 되었고,<br>20년의 원한은 형제의 포옹으로 녹아내렸습니다.<br><br>"내가 형의 얼굴을 보니<br>하나님의 얼굴을 보는 것 같습니다."</p>
    <div class="end-verse">창세기 33:10</div>
    <button id="replay-btn" onclick="replayGame()">↺ &nbsp;다시 보기</button>
  </div>
</div>

<script>
const SCENES = [
  {
    type:'normal', img:1,
    icon:'😰', name:'JACOB',
    chapter:'창세기 32장 — 에서가 오고 있다', verse:'창 32:6-7',
    text:'전령이 돌아와 말했다. "주인의 형 에서가 400명을 거느리고 오고 있습니다." 야곱이 심히 두렵고 답답하였다. 20년 전, 형의 장자권을 빼앗고 도망쳤던 그날이 떠올랐다.',
    btn:'하나님께 부르짖다 →',
    night:true, divine:false, rays:false, doubt:false, warm:false, spark:false, flash:false,
  },
  {
    type:'normal', img:1,
    icon:'🙏', name:'JACOB',
    chapter:'야곱의 간절한 기도', verse:'창 32:9-11',
    text:'"나의 조부 아브라함의 하나님, 나의 아버지 이삭의 하나님이여! 나는 주께서 베푸신 모든 은총을 받을 자격이 없습니다. 내 형 에서의 손에서 나를 건져 주옵소서. 그가 와서 나와 내 자녀들을 칠까 두렵습니다."',
    btn:'밤이 깊어지다 →',
    night:true, divine:false, rays:false, doubt:false, warm:false, spark:false, flash:false,
  },
  {
    type:'choice', img:1,
    icon:'😰', name:'JACOB',

  },
  {

    icon:'🤝', name:'ESAU',

    btn:'✨ 마치다',
    night:false, divine:true, rays:true, doubt:false, warm:true, spark:true, flash:false,

const MOODS = ['tension','prayer','doubt','wrestle','divine','warm','holy'];

let cur = -1, muted = false, typeTimer = null;

function setIllus(w) {
  document.getElementById('illus1').style.opacity = w===1?'1':'0';
  document.getElementById('illus2').style.opacity = w===2?'1':'0';
}
function setOverlays(s) {
  document.getElementById('ov-night').style.opacity   = s.night ?'1':'0';
  document.getElementById('ov-divine').style.opacity  = s.divine?'1':'0';
  document.getElementById('ov-doubt').style.opacity   = s.doubt ?'1':'0';
  document.getElementById('ov-warm').style.opacity    = s.warm  ?'1':'0';
  document.getElementById('light-rays').style.opacity = s.rays  ?'1':'0';
  document.getElementById('moonlight').className      = s.night ?'show':'';
}
function flashEffect() {
  const el=document.getElementById('ov-flash');
  el.style.transition='opacity 0s'; el.style.opacity='1';
  setTimeout(()=>{el.style.transition='opacity 1.5s'; el.style.opacity='0';},80);
}
function spawnSparks(n=28) {
  const colors=['#F5C842','#ffe480','#c8b0ff','#ffffff','#a0c8ff','#ffd060'];
  for(let i=0;i<n;i++) setTimeout(()=>{
    const sp=document.createElement('div'); sp.className='spark';
    const a=Math.random()*Math.PI*2, d=55+Math.random()*130;
    sp.style.setProperty('--dx',Math.cos(a)*d+'px');
    sp.style.setProperty('--dy',Math.sin(a)*d+'px');
    sp.style.width=sp.style.height=(3+Math.random()*5)+'px';
    sp.style.background=colors[Math.floor(Math.random()*colors.length)];
    sp.style.left=(12+Math.random()*76)+'vw';
    sp.style.top=(8+Math.random()*55)+'vh';
    sp.style.animationDuration=(0.9+Math.random()*0.8)+'s';
    document.body.appendChild(sp);
    setTimeout(()=>sp.remove(),1900);
  },i*42);
}
function typeText(text) {
  clearInterval(typeTimer);
  const el=document.getElementById('dialog-content');
  el.textContent=''; let i=0;
  typeTimer=setInterval(()=>{
    if(i<text.length) el.textContent+=text[i++];
    else clearInterval(typeTimer);
  },27);
}
function buildDots() {
  const wrap=document.getElementById('dots'); wrap.innerHTML='';
  SCENES.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i<=cur?' on':'');
    wrap.appendChild(d);
  });
}
function setChapter(ch,vs) {
  const ct=document.getElementById('chapter-title');
  ct.classList.remove('show');
  setTimeout(()=>{ct.textContent=ch; ct.classList.add('show');},300);
  const vb=document.getElementById('verse-badge');
  vb.classList.remove('show');
  if(vs) setTimeout(()=>{vb.textContent=vs; vb.classList.add('show');},600);
  else vb.classList.remove('show');
}
function showChoiceOverlay() {
  document.getElementById('choice-overlay').classList.add('show');
  document.getElementById('next-btn').style.visibility='hidden';
}
function hideChoiceOverlay() {
  document.getElementById('choice-overlay').classList.remove('show');
  document.getElementById('next-btn').style.visibility='visible';
}

function choose(isPray) {
  hideChoiceOverlay();
  const resultEl=document.getElementById('choice-result');
  const card=document.getElementById('result-card');
  if(isPray) {
    card.className='result-card res-pray';
    document.getElementById('result-icon').textContent='🙏';
    document.getElementById('result-title').textContent='두려움이 기도가 되었다!';
    document.getElementById('result-text').textContent=
      '야곱은 떨리는 손을 모았다. "하나님, 저는 두렵습니다. 그러나 당신의 약속을 붙잡겠습니다." 그 밤, 야곱은 홀로 얍복 강가에서 날이 새도록 하나님과 씨름하였다. 두려움은 기도가 되고, 기도는 씨름이 되었다.';
    if(!muted) Music.play('wrestle');
    spawnSparks(18);
  } else {
    card.className='result-card res-fear';
    document.getElementById('result-icon').textContent='😨';
    document.getElementById('result-title').textContent='두려움이 야곱을 삼켰다…';
    document.getElementById('result-text').textContent=
      '야곱은 밤새 두려움에 떨었다. "20년 전 내가 한 일을 형이 갚으러 오는 것이다." 그러나 그 밤, 하나님은 떨고 있는 야곱에게 찾아오셨다. 두려움 속에서도 하나님은 역사하신다. 씨름이 시작되었다!';
    if(!muted) Music.play('wrestle');
  }
  const oldBtn=document.getElementById('result-continue-btn');
  const newBtn=oldBtn.cloneNode(true);
  oldBtn.parentNode.replaceChild(newBtn,oldBtn);
  newBtn.addEventListener('click',()=>{
    resultEl.classList.remove('show');
    cur++; applyScene(cur);
  });
  resultEl.classList.add('show');
}

function applyScene(idx) {
  const s=SCENES[idx];
  setIllus(s.img);
  setOverlays(s);
  setChapter(s.chapter,s.verse);
  if(s.spark) spawnSparks();
  if(s.flash) setTimeout(flashEffect,400);
  document.getElementById('portrait-icon').textContent=s.icon;
  document.getElementById('portrait-name').textContent=s.name;
  document.getElementById('next-btn').textContent=s.btn;
  typeText(s.text);
  buildDots();
  document.getElementById('progress-fill').style.width=((idx+1)/SCENES.length*100)+'%';
  if(!muted){ const m=MOODS[idx]; if(m) Music.play(m); }
  if(s.type==='choice') setTimeout(showChoiceOverlay,1900);
}
function nextScene() {
  cur++;
  if(cur>=SCENES.length){ showEnd(); return; }
  applyScene(cur);
}
function showEnd() {
  document.getElementById('end-screen').classList.add('show');
  if(!muted) Music.play('holy');
  spawnSparks(40); setTimeout(()=>spawnSparks(28),900);
}
function replayGame() {
  document.getElementById('end-screen').classList.remove('show');
  document.getElementById('choice-overlay').classList.remove('show');
  document.getElementById('choice-result').classList.remove('show');
  document.getElementById('next-btn').style.visibility='visible';
  Music.stop();
  setTimeout(()=>{ cur=0; applyScene(0); },1400);
}
function startGame() {
  document.getElementById('title-screen').style.display='none';
  Music.init(); cur=0; applyScene(0);
}
function toggleMute() {
  muted=!muted;
  document.getElementById('mute-btn').textContent=muted?'🔇':'🔊';
  if(muted) Music.stop();
  else{ Music.init(); const m=MOODS[cur]; if(m) Music.play(m); }
}

/* ════════════════════════════════
   MUSIC ENGINE
   moods: tension / prayer / doubt / wrestle / divine / warm / holy
════════════════════════════════ */
const Music=(()=>{
  let ctx,masterGain,currentMood=null;
  let oscList=[],lfoList=[],intervalList=[];

  function init(){
    if(ctx) return;
    ctx=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=ctx.createGain();
    masterGain.gain.setValueAtTime(0,ctx.currentTime);
    masterGain.connect(ctx.destination);
  }
  function stopAll(fade=1.5){
    const now=ctx.currentTime;
    masterGain.gain.cancelScheduledValues(now);
    masterGain.gain.setValueAtTime(masterGain.gain.value,now);
    masterGain.gain.linearRampToValueAtTime(0,now+fade);
    intervalList.forEach(id=>clearInterval(id)); intervalList=[];
    setTimeout(()=>{
      oscList.forEach(o=>{try{o.stop();}catch(e){}}); oscList=[];
      lfoList.forEach(o=>{try{o.stop();}catch(e){}}); lfoList=[];
    },(fade+0.1)*1000);
  }
  function fadeIn(vol=0.32,dur=2.5){
    const now=ctx.currentTime;
    masterGain.gain.cancelScheduledValues(now);
    masterGain.gain.setValueAtTime(0,now);
    masterGain.gain.linearRampToValueAtTime(vol,now+dur);
  }
  function makeOsc(type,freq,gainVal){
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type=type; o.frequency.value=freq; g.gain.value=gainVal;
    o.connect(g); g.connect(masterGain); o.start();
    oscList.push(o); return {osc:o,gain:g};
  }
  function makeLFO(target,rate,depth,base){
    const lfo=ctx.createOscillator(),lg=ctx.createGain();
    lfo.frequency.value=rate; lg.gain.value=depth;
    lfo.connect(lg); lg.connect(target); target.value=base;
    lfo.start(); lfoList.push(lfo);
  }
  function makeReverb(sec=2,decay=2){
    const conv=ctx.createConvolver(),rate=ctx.sampleRate,len=rate*sec;
    const buf=ctx.createBuffer(2,len,rate);
    for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);}
    conv.buffer=buf; return conv;
  }

  /* TENSION — 에서가 오고 있다, 긴박한 저음 */
  function playTension(){
    const rev=makeReverb(1.5,3); rev.connect(masterGain);
    const d1=makeOsc('sawtooth',55,0.07);
    const d2=makeOsc('sawtooth',55.4,0.06);
    makeLFO(d1.osc.frequency,0.13,2.5,55);
    const pulse=[116.54,110,123.47,110,103.83,110];
    let pi=0;
    const rhythm=[320,320,480,320,640,320];
    let ri=0;
    function schedulePulse(){
      intervalList.push(setTimeout(()=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sawtooth'; o.frequency.value=pulse[pi%pulse.length];
        g.gain.setValueAtTime(0.16,ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.22);
        o.connect(g); g.connect(rev); o.start(); o.stop(ctx.currentTime+0.25);
        oscList.push(o); pi++; ri++; schedulePulse();
      },rhythm[ri%rhythm.length]));
    }
    schedulePulse(); fadeIn(0.40,1.8);
  }

  /* PRAYER — 간절한 기도, 조용한 아르페지오 */
  function playPrayer(){
    const rev=makeReverb(3,2); rev.connect(masterGain);
    const notes=[220,261.63,329.63,392,440,392,329.63,261.63];
    let ni=0;
    const pad=makeOsc('sine',110,0.12);
    makeLFO(pad.gain.gain,0.22,0.04,0.12);
    function pn(){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine'; o.frequency.value=notes[ni%notes.length];
      g.gain.setValueAtTime(0,ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.16,ctx.currentTime+0.08);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.9);
      o.connect(g); g.connect(rev); o.start(); o.stop(ctx.currentTime+1);
      oscList.push(o); ni++;
    }
    pn(); intervalList.push(setInterval(pn,520)); fadeIn(0.32,3);
  }

  /* DOUBT — 내적 갈등, 불안한 반음계 */
  function playDoubt(){
    const rev=makeReverb(2,2.6); rev.connect(masterGain);
    const u=[220,233.08,220,207.65,220,246.94,233.08,220];
    let ui=0;
    function pu(){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine'; o.frequency.value=u[ui%u.length];
      g.gain.setValueAtTime(0,ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.13,ctx.currentTime+0.12);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+0.62);
      o.connect(g); g.connect(rev); o.start(); o.stop(ctx.currentTime+0.7);
      oscList.push(o); ui++;
    }
    pu(); intervalList.push(setInterval(pu,640));
    const low=makeOsc('sine',110,0.09); makeLFO(low.gain.gain,5.8,0.07,0.09);
    fadeIn(0.30,2);
  }

  /* WRESTLE — 씨름, 강렬하고 박진감 */
  function playWrestle(){
    const rev=makeReverb(1.2,3.5); rev.connect(masterGain);
    const d=makeOsc('sawtooth',55,0.10);
    makeLFO(d.osc.frequency,0.20,4,55);
    const hi=makeOsc('sawtooth',110,0.06);
    makeLFO(hi.gain.gain,3.2,0.04,0.06);
    const stress=[146.83,155.56,146.83,138.59,146.83,164.81,155.56];
    let si=0;
    function ps(){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='triangle'; o.frequency.value=stress[si%stress.length];
      g.gain.setValueAtTime(0,ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.18,ctx.currentTime+0.06);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.35);
      o.connect(g); g.connect(rev); o.start(); o.stop(ctx.currentTime+0.4);
      oscList.push(o); si++;
    }
    ps(); intervalList.push(setInterval(ps,380)); fadeIn(0.44,1.5);
  }

  /* DIVINE — 천사의 축복, 웅장한 화음 */
  function playDivine(){
    const rev=makeReverb(3.2,1.8); rev.connect(masterGain);
    const chords=[[174.61,261.63,349.23,523.25],[196,293.66,392,587.33],[220,329.63,440,659.25],[196,293.66,392,587.33]];
    let ci=0;
    function pc(){
      chords[ci%chords.length].forEach((freq,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type=i<2?'sine':'triangle'; o.frequency.value=freq;
        o.detune.value=(Math.random()-0.5)*7;
        g.gain.setValueAtTime(0,ctx.currentTime);
        g.gain.linearRampToValueAtTime(0.11,ctx.currentTime+0.9);
        g.gain.linearRampToValueAtTime(0,ctx.currentTime+3.0);
        o.connect(g); g.connect(rev); o.start(); o.stop(ctx.currentTime+3.1);
        oscList.push(o);
      }); ci++;
    }
    pc(); intervalList.push(setInterval(pc,3000));
    makeOsc('sine',87.31,0.13); fadeIn(0.42,3);
  }

  /* WARM — 에서와의 화해, 따뜻한 장조 */
  function playWarm(){
    const rev=makeReverb(2.5,2); rev.connect(masterGain);
    const melody=[261.63,329.63,392,440,523.25,440,392,329.63,261.63,329.63,392,523.25];
    let mi=0;
    [[130.81,0.14],[196,0.10]].forEach(([f,v])=>{
      const p=makeOsc('sine',f,v); makeLFO(p.gain.gain,0.25,0.04,v);
    });
    function pm(){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='triangle'; o.frequency.value=melody[mi%melody.length];
      g.gain.setValueAtTime(0,ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.18,ctx.currentTime+0.06);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.75);
      o.connect(g); g.connect(rev); o.start(); o.stop(ctx.currentTime+0.85);
      oscList.push(o); mi++;
    }
    pm(); intervalList.push(setInterval(pm,440)); fadeIn(0.40,2.5);
  }

  /* HOLY — 엔딩 성스러운 합창 */
  function playHoly(){
    const rev=makeReverb(5,1.4); rev.connect(masterGain);
    const rev2=makeReverb(3,2.2); rev2.connect(masterGain);
    const sop=[329.63,369.99,415.30,493.88,523.25,493.88,554.37,523.25,493.88,415.30,369.99,440,493.88,523.25,587.33,523.25];
    const alt=[261.63,293.66,329.63,392,415.30,392,440,415.30,392,329.63,293.66,349.23,392,415.30,493.88,415.30];
    let si=0,ai=0;
    function pS(){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine'; o.frequency.value=sop[si%sop.length];
      o.detune.value=(Math.random()-0.5)*5;
      g.gain.setValueAtTime(0,ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.17,ctx.currentTime+0.3);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+1.1);
      o.connect(g); g.connect(rev); o.start(); o.stop(ctx.currentTime+1.2);
      oscList.push(o); si++;
    }
    function pA(){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine'; o.frequency.value=alt[ai%alt.length];
      o.detune.value=(Math.random()-0.5)*6;
      g.gain.setValueAtTime(0,ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.12,ctx.currentTime+0.4);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+1.1);
      o.connect(g); g.connect(rev); o.start(); o.stop(ctx.currentTime+1.2);
      oscList.push(o); ai++;
    }
    const org=[[164.81,246.94,329.63,493.88],[196,293.66,392,587.33],[220,329.63,440,659.25],[196,293.66,392,523.25]];
    let oi=0;
    function pO(){
      org[oi%org.length].forEach((freq,hi)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type=hi<2?'sine':'triangle'; o.frequency.value=freq;
        g.gain.setValueAtTime(0,ctx.currentTime);
        g.gain.linearRampToValueAtTime(0.062,ctx.currentTime+1.0);
        g.gain.linearRampToValueAtTime(0,ctx.currentTime+3.9);
        o.connect(g); g.connect(rev2); o.start(); o.stop(ctx.currentTime+4.0);
        oscList.push(o);
      }); oi++;
    }
    [[164.81,0.11],[196,0.09],[246.94,0.07]].forEach(([f,v])=>{const p=makeOsc('sine',f,v);makeLFO(p.gain.gain,0.17,0.03,v);});
    pS();pA();pO();
    intervalList.push(setInterval(()=>{pS();pA();},1100));
    intervalList.push(setInterval(pO,4000));
    fadeIn(0.46,4);
  }

  const MAP={tension:playTension,prayer:playPrayer,doubt:playDoubt,wrestle:playWrestle,divine:playDivine,warm:playWarm,holy:playHoly};

  function play(mood){
    if(!ctx) return;
    if(mood===currentMood) return;
    currentMood=mood;
    stopAll(1.2);
    setTimeout(()=>{if(currentMood!==mood)return; MAP[mood]?.();},1300);
  }
  function stop(){stopAll(2);currentMood=null;}
  return {init,play,stop};
})();
